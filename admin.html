<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f5f5f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}
.box{
    background:#fff;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,.2);
    width:300px;
}
h2{
    text-align:center;
}
input{
    width:100%;
    padding:10px;
    margin:10px 0;
    box-sizing:border-box;
}
button{
    width:100%;
    padding:10px;
    background:#007BFF;
    color:white;
    border:none;
    border-radius:5px;
    font-size:16px;
}
</style>
</head>

<body>

<div class="box">
<h2>Admin Login</h2>

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Login</button>

<p id="msg"></p>
</div>

<script>
function login(){
    var user=document.getElementById("username").value;
    var pass=document.getElementById("password").value;

    if(user=="admin" && pass=="123456"){
        window.location.href="dashboard.html";
    }else{
        document.getElementById("msg").innerHTML="ভুল Username বা Password";
        document.getElementById("msg").style.color="red";
    }
}
</script>

</body>
</html>
